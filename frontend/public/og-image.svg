<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- MediSlot — Social Preview / OG Image -->
  <rect width="1200" height="630" fill="#0F172A" />
  
  <!-- Subtle decorative primary blue radial background -->
  <circle cx="600" cy="315" r="480" fill="#2563EB" opacity="0.12" />
  
  <!-- Logo Card Container -->
  <g transform="translate(140, 165)">
    <!-- Icon Box (120x120) -->
    <rect width="120" height="120" rx="28" fill="#2563EB" />
    <path d="M 60 26 L 60 94" stroke="#FFFFFF" stroke-width="22" stroke-linecap="round" />
    <path d="M 26 60 L 94 60" stroke="#FFFFFF" stroke-width="22" stroke-linecap="round" />
  </g>
  
  <!-- Brand Wordmark -->
  <text x="290" y="245" font-family="'Manrope', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif" font-size="76" font-weight="800" fill="#FFFFFF" letter-spacing="-2">Medi<tspan fill="#2563EB">Slot</tspan></text>
  
  <!-- Tagline -->
  <text x="290" y="305" font-family="'Manrope', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif" font-size="34" font-weight="600" fill="#F8FBFF" opacity="0.9">Intelligent Healthcare &amp; Appointment Scheduling Platform</text>
  
  <!-- Feature Pills -->
  <g transform="translate(290, 350)">
    <rect x="0" y="0" width="220" height="46" rx="23" fill="rgba(255,255,255,0.12)" />
    <text x="110" y="29" font-family="'Manrope', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif" font-size="17" font-weight="600" fill="#FFFFFF" text-anchor="middle">Verified Specialists</text>
    
    <rect x="235" y="0" width="220" height="46" rx="23" fill="rgba(255,255,255,0.12)" />
    <text x="345" y="29" font-family="'Manrope', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif" font-size="17" font-weight="600" fill="#FFFFFF" text-anchor="middle">Instant Triage &amp; Booking</text>
    
    <rect x="470" y="0" width="240" height="46" rx="23" fill="rgba(255,255,255,0.12)" />
    <text x="590" y="29" font-family="'Manrope', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif" font-size="17" font-weight="600" fill="#FFFFFF" text-anchor="middle">HIPAA-Inspired Security</text>
  </g>
  
  <!-- Footer Note -->
  <text x="140" y="550" font-family="'Manrope', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif" font-size="20" font-weight="500" fill="rgba(255,255,255,0.5)">© 2026 MediSlot Healthcare Platforms Inc. • Enterprise SaaS System</text>
