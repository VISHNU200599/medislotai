<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <!-- MediSlot AI — Social Preview / OG Image -->
  <!-- Background -->
  <rect width="1200" height="630" fill="#0B4F8C"/>

  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Left section: Logo Icon (centered vertically, left-aligned) -->
  <g transform="translate(120, 175)">
    <!-- Icon container: rounded square Medical Blue -->
    <rect width="280" height="280" rx="52" fill="#1565C0"/>

    <!-- Abstract stethoscope M monoline icon (scaled 4.375x from 64-unit grid) -->
    <!-- Left earpiece -->
    <path d="M 92 57 C 79 57, 66 67, 66 83 L 66 122"
      stroke="white" stroke-width="17.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Left arch to center valley -->
    <path d="M 66 122 C 66 153, 140 153, 140 122"
      stroke="white" stroke-width="17.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Right arch from center valley -->
    <path d="M 140 122 C 140 153, 214 153, 214 122"
      stroke="white" stroke-width="17.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Right earpiece -->
    <path d="M 214 122 L 214 83 C 214 67, 201 57, 188 57"
      stroke="white" stroke-width="17.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Earbud tips -->
    <circle cx="92" cy="57" r="14" fill="white"/>
    <circle cx="188" cy="57" r="14" fill="white"/>
    <!-- Drop tube -->
    <path d="M 140 153 L 140 200"
      stroke="white" stroke-width="17.5" stroke-linecap="round" fill="none"/>
    <!-- Chest piece -->
    <circle cx="140" cy="222" r="21.8" stroke="white" stroke-width="15.3" fill="none"/>
  </g>

  <!-- Right section: Wordmark + Tagline -->
  <text x="480" y="275"
    font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif"
    font-size="96"
    font-weight="800"
    letter-spacing="-3"
    fill="white">MediSlot</text>
  <text x="480" y="375"
    font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif"
    font-size="96"
    font-weight="800"
    letter-spacing="-3"
    fill="rgba(255,255,255,0.55)">AI</text>

  <text x="482" y="430"
    font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif"
    font-size="32"
    font-weight="500"
    letter-spacing="1"
    fill="rgba(255,255,255,0.65)">Intelligent Healthcare Platform</text>

  <!-- Bottom accent line -->
  <rect x="480" y="462" width="80" height="4" rx="2" fill="#1565C0"/>
</svg>
