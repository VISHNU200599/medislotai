<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Primary Title & Meta ─────────────────────────────────────────── -->
    <title>MediSlot AI | Intelligent Healthcare Platform</title>
    <meta name="description" content="MediSlot AI connects patients with top doctors and hospitals for seamless appointment booking, smart scheduling, and intelligent healthcare management." />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <meta property="og:type" content="website" />

    <meta name="twitter:image" content="/favicon.svg" />

    <meta name="theme-color" content="#1565C0" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
